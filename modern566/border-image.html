<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Ultra Lean Renderer v2</title>
<style>
    body,html{
        padding: 0;
        margin: 0;
        background-color: blueviolet;
    }
#bitmap {
  width: 200px;
  background-color: aqua;
  border: 36px solid blue;
  margin: 30px;
  padding: 10px;

  border-image: url("border.png") 27 / 36px 28px 18px 8px / 18px 14px 9px 4px
    round;
}

#main {
  width: 600px;
  height: 126px;
  background-color: rgba(9, 109, 109, 0.24);
  background: transparent;
  /* border: 36px solid blue; */
  margin: 30px;
  /* padding: 10px; */
  box-sizing: border-box;

  border-image-source: url("main.png");
  border-image-slice: 0 128 128 200;
  border-image-width: 0px 128px 128px 200px;
  border-image-repeat: stretch;
}
.full {
    background-color: rgba(0, 255, 0, 0.164);
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>
<div id="bitmap">
  This element is surrounded by a bitmap-based border image!
</div>
<div id="main">
  <div class="full">hello moto</div>
</div>

</body>
</html>
