<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Ultra Lean Renderer Playground</title>
<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: monospace;
}
#editor {
  width: 50%;
  padding: 10px;
  border-right: 1px solid #ccc;
  box-sizing: border-box;
}
#preview {
  width: 50%;
  padding: 10px;
  box-sizing: border-box;
}
textarea {
  width: 100%;
  height: 100%;
  resize: none;
}
.window {
  background: #222;
  color: #0f0;
  padding: 10px;
}
.list-item {
  padding: 4px;
  border-bottom: 1px solid #333;
}
</style>
</head>
<body>

<div id="editor">
<textarea id="jsonInput">
{
  "type": "div",
  "props": { "class": "window" },
  "children": [
    { "type": "text", "value": "Winamp Main" },
    {
      "type": "list",
      "key": "playlist",
      "items": [
        { "id": 1, "label": "Track 01.mp3" },
        { "id": 2, "label": "Track 02.mp3" }
      ]
    }
  ]
}
</textarea>
</div>

<div id="preview"></div>

<script>
// -----------------------------
// Ultra-Lean Renderer Core
// -----------------------------

function h(type, props = {}, children = []) {
  return { type, props, children }
}

function mount(vnode, container) {
  const el = createElement(vnode)
  container.appendChild(el)
  return el
}

function createElement(vnode) {
  if (vnode.type === "text") {
    return document.createTextNode(vnode.value)
  }

  if (vnode.type === "list") {
    const wrapper = document.createElement("div")
    wrapper._listKey = vnode.key
    wrapper._items = new Map()
    patchList(wrapper, [], vnode.items)
    return wrapper
  }

  const el = document.createElement(vnode.type)

  for (const k in vnode.props || {}) {
    el.setAttribute(k, vnode.props[k])
  }

  (vnode.children || []).forEach(child => {
    el.appendChild(createElement(child))
  })

  return el
}

// -----------------------------
// Static Patch (shallow only)
// -----------------------------

function patch(container, newVNode) {
  container.innerHTML = ""
  mount(newVNode, container)
}

// -----------------------------
// Simple Keyed List Diff
// -----------------------------

function patchList(container, oldItems, newItems) {
  const oldMap = container._items || new Map()
  const newMap = new Map()

  newItems.forEach(item => {
    if (oldMap.has(item.id)) {
      const el = oldMap.get(item.id)
      el.textContent = item.label
      newMap.set(item.id, el)
    } else {
      const el = document.createElement("div")
      el.className = "list-item"
      el.textContent = item.label
      container.appendChild(el)
      newMap.set(item.id, el)
    }
  })

  oldMap.forEach((el, id) => {
    if (!newMap.has(id)) {
      el.remove()
    }
  })

  container._items = newMap
}

// -----------------------------
// AST → Render
// -----------------------------

let currentAST = null

function renderAST(ast) {
  const preview = document.getElementById("preview")
  preview.innerHTML = ""
  currentAST = ast
  mount(ast, preview)
}

// -----------------------------
// Editor Binding
// -----------------------------

const input = document.getElementById("jsonInput")

function update() {
  try {
    const ast = JSON.parse(input.value)
    renderAST(ast)
  } catch (e) {
    console.warn("Invalid JSON")
  }
}

input.addEventListener("input", update)

update()
</script>

</body>
</html>
