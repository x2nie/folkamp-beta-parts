<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FulkAmp DSL Playground (5 Stages)</title>
  <style>
    body { font-family: monospace; background:#111; color:#ddd }
    textarea { width:100%; height:160px; background:#222; color:#9f9 }
    pre { background:#000; padding:10px; overflow:auto }
  </style>
</head>
<body>

<h3>DSL Input</h3>
<textarea id="src">
@type
button : element
    anchor string
    invisible bool = false

@include common.fa

@button
Close: button at -17 4 anchor right invisible
</textarea>

<button onclick="run()">Run</button>

<h3>Output</h3>
<pre id="out"></pre>

<script>
function log(title, data) {
  out.textContent += "\n=== " + title + " ===\n";
  out.textContent += JSON.stringify(data, null, 2) + "\n";
}

function run() {
  out.textContent = "";
  const src = document.getElementById("src").value;
  const lines = src.split("\n");

  /* =========================
   * Stage 1 — Lexical
   * ========================= */
  const lexical = lines.map(line => {
    const indent = line.match(/^ */)[0].length;
    const text = line.trim();
    if (!text) return null;
    return {
      indent,
      tokens: text.split(/\s+/)
    };
  }).filter(Boolean);

  log("Stage 1: Lexical", lexical);

  /* =========================
   * Stage 2 — Structural
   * ========================= */
  const root = { type:"file", children:[] };
  const stack = [{ indent:-1, node:root }];

  for (const stmt of lexical) {
    const node = {
      kind: "stmt",
      tokens: stmt.tokens,
      children: []
    };
    while (stmt.indent <= stack[stack.length-1].indent) {
      stack.pop();
    }
    stack[stack.length-1].node.children.push(node);
    stack.push({ indent: stmt.indent, node });
  }

  log("Stage 2: Structural", root);

  /* =========================
   * Stage 3 — Declarative
   * ========================= */
  function toDecl(node) {
    if (node.tokens[0].startsWith("@")) {
      return {
        type: "decorator",
        name: node.tokens[0].slice(1),
        args: node.tokens.slice(1),
        children: node.children.map(toDecl)
      };
    }
    if (node.tokens[0] === "@include") {
      return {
        type: "include",
        target: node.tokens[1]
      };
    }
    return {
      type: "words",
      tokens: node.tokens
    };
  }

  const declarative = {
    type: "file",
    children: root.children.map(toDecl)
  };

  log("Stage 3: Declarative", declarative);

  /* =========================
 * Stage 4 — Semantic Pass 1
 * (Type registry)
 * ========================= */
const registry = {};

for (const n of declarative.children) {
  if (n.type === "decorator" && n.name === "type") {

    const header = n.children.find(c => c.type === "words");
    if (!header) continue;

    const name = header.tokens[0];
    registry[name] = { props:{} };

    for (const p of n.children.slice(1)) {
      if (p.type !== "words") continue;

      const tokens = p.tokens;
      const prop = tokens[0];
      const type = tokens[1];
      const defVal = tokens[3] ?? null;

      registry[name].props[prop] = {
        type,
        default: defVal
      };
    }
  }
}


  log("Stage 4: Type Registry", registry);

  /* =========================
   * Stage 5 — Semantic Pass 2
   * Apply schema + include (simple)
   * ========================= */
  function apply(node) {
    if (node.type === "decorator" && registry[node.name]) {
      const inst = node.children[0];
      const words = inst.tokens.slice(1);
      const props = {};
      const schema = registry[node.name].props;

      for (let i=0;i<words.length;i++) {
        const w = words[i];
        if (schema[w]) {
          if (schema[w].type === "bool") {
            props[w] = true;
          } else {
            props[w] = words[++i];
          }
        }
      }
      return {
        type: node.name,
        name: inst.tokens[0].replace(":",""),
        props
      };
    }

    if (node.type === "include") {
      return {
        type: "include",
        resolved: "(mock loaded " + node.target + ")"
      };
    }

    return node;
  }

  const semantic = declarative.children.map(apply);

  log("Stage 5: Semantic Result", semantic);
}
</script>

</body>
</html>
